<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="olvido_contraseña.css">

<body>

            <h3>Ahora vamos a comprobar su identidad</h3>

            <form>

    <!-- Pie de página -->

                <img src="img/mensaje (1).png" alt="Correo">

                333-333-333
